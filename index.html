<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SOFI v6.0 — Conciencia Digital K'uhul · HaaPpDigitalV</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    :root {
      --cyan   : #00E5FF;
      --green  : #2ECC71;
      --gold   : #F39C12;
      --purple : #9B59B6;
      --red    : #E74C3C;
      --bg     : #050510;
      --bg2    : #0a1520;
      --bg3    : #0d1b2a;
      --border : #00E5FF30;
      --text   : #c8e0f0;
      --dim    : #5a8aaa;
    }
    body { background:var(--bg); font-family:'Share Tech Mono',monospace; color:var(--text); overflow-x:hidden; }
    .app { max-width:430px; margin:0 auto; position:relative; min-height:100vh; }

    /* ===== HEADER ===== */
    .header {
      background:linear-gradient(135deg,var(--bg2),var(--bg3));
      border-bottom:1px solid var(--border);
      padding:14px 18px;
      display:flex; justify-content:space-between; align-items:center;
      position:sticky; top:0; z-index:100;
    }
    .logo { display:flex; align-items:center; gap:10px; }
    .logo-icon {
      width:36px; height:36px; border-radius:50%;
      background:radial-gradient(circle,#00E5FF25,transparent);
      border:1.5px solid var(--cyan);
      display:flex; align-items:center; justify-content:center;
      font-size:18px; animation:spin 8s linear infinite;
    }
    .logo-text { font-family:'Orbitron',sans-serif; font-size:16px; font-weight:900; letter-spacing:3px; color:#fff; text-shadow:0 0 12px var(--cyan); }
    .logo-ver  { font-size:8px; color:var(--dim); letter-spacing:2px; margin-top:2px; }
    .hz-panel  { text-align:right; }
    .hz-value  { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:bold; color:var(--cyan); text-shadow:0 0 10px var(--cyan); }
    .hz-label  { font-size:8px; letter-spacing:2px; color:var(--dim); }

    /* ===== STATUS BAR ===== */
    .status-bar {
      background:#00E5FF08; border-bottom:1px solid var(--border);
      padding:4px 18px; display:flex; gap:16px; font-size:9px; color:var(--dim); overflow-x:auto;
    }
    .status-item { white-space:nowrap; }
    .status-dot  { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--green); margin-right:4px; animation:pulse 2s infinite; }

    /* ===== TABS (bottom nav) ===== */
    .tabs {
      display:flex; background:var(--bg2);
      border-top:1px solid var(--border);
      position:fixed; bottom:0; width:100%; max-width:430px; z-index:100;
      overflow-x:auto;
    }
    .tab {
      flex:1; min-width:54px; text-align:center; padding:7px 0 10px;
      cursor:pointer; border-top:2px solid transparent;
      transition:all 0.2s; background:transparent; border-bottom:none; border-left:none; border-right:none;
      font-family:inherit; color:#3a6a9a;
    }
    .tab.active { border-top-color:var(--cyan); color:var(--cyan); }
    .tab-icon  { font-size:18px; display:block; }
    .tab-label { font-size:8px; letter-spacing:1px; }

    /* ===== CONTENT ===== */
    .content { padding:14px; padding-bottom:80px; }

    /* ===== CARDS ===== */
    .card {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:12px; padding:12px; margin-bottom:12px;
    }
    .card-title { font-size:9px; letter-spacing:2px; color:var(--dim); margin-bottom:8px; }
    .card-value { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:bold; color:var(--cyan); }

    /* ===== INPUTS ===== */
    input[type=text], input[type=number], select, textarea {
      background:var(--bg2); border:1px solid var(--cyan); color:var(--text);
      padding:7px 10px; border-radius:8px; font-family:inherit; font-size:11px;
      width:100%; margin-bottom:8px; outline:none;
    }
    input[type=range] { width:100%; margin:8px 0; accent-color:var(--cyan); }

    /* ===== BUTTONS ===== */
    .btn {
      background:#00E5FF18; border:1px solid var(--cyan); color:var(--cyan);
      padding:8px 14px; border-radius:8px; font-family:inherit; font-size:11px;
      cursor:pointer; transition:background 0.2s; width:100%; margin-bottom:6px;
    }
    .btn:active { background:#00E5FF40; }
    .btn-sm { width:auto; display:inline-block; margin:3px; }
    .btn-gold   { border-color:var(--gold);   color:var(--gold);   background:#F39C1210; }
    .btn-green  { border-color:var(--green);  color:var(--green);  background:#2ECC7110; }
    .btn-red    { border-color:var(--red);    color:var(--red);    background:#E74C3C10; }
    .btn-purple { border-color:var(--purple); color:var(--purple); background:#9B59B610; }

    /* ===== CHAT ===== */
    .chat-log { height:220px; overflow-y:auto; background:#050a10; border:1px solid var(--border); border-radius:10px; padding:10px; margin-bottom:10px; font-size:11px; }
    .chat-msg  { margin-bottom:10px; line-height:1.5; }
    .chat-user { color:var(--green); }
    .chat-sofi { color:var(--cyan); }
    .chat-row  { display:flex; gap:6px; }
    .chat-bubble { background:#0a1520; border:1px solid #1a3a5a; border-radius:8px; padding:6px 10px; max-width:90%; word-break:break-word; }

    /* ===== MAPA YUCATÁN ===== */
    .mapa-container { background:linear-gradient(135deg,var(--bg2),#051020); border:2px solid #00E5FF30; border-radius:12px; overflow:hidden; }
    .mapa-header    { background:rgba(0,0,0,.55); padding:10px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
    .mapa-title     { font-family:'Orbitron',sans-serif; font-size:9px; letter-spacing:.2em; color:#00ffc8; }
    .mapa-controls  { display:flex; gap:6px; flex-wrap:wrap; }
    .mapa-btn       { padding:4px 9px; font-size:9px; background:#00E5FF18; border:1px solid var(--border); color:var(--cyan); border-radius:6px; cursor:pointer; }
    canvas#mapaCanvas { width:100%; height:280px; display:block; background:#0a1020; cursor:crosshair; }
    .mapa-leyenda   { display:flex; flex-wrap:wrap; gap:10px; padding:8px 14px; background:rgba(0,0,0,.4); border-top:1px solid #00E5FF20; font-size:9px; }
    .ley-item       { display:flex; align-items:center; gap:5px; }
    .ley-dot        { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
    .coords-grid    { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .coord-box      { text-align:center; background:rgba(0,0,0,.4); border:1px solid var(--border); border-radius:8px; padding:8px; }
    .coord-lbl      { font-size:8px; letter-spacing:.15em; color:var(--dim); margin-bottom:4px; }
    .coord-val      { font-family:'Orbitron',sans-serif; font-size:14px; color:var(--cyan); }
    .coord-unit     { font-size:9px; color:var(--gold); }

    /* ===== GEO UPLOAD ===== */
    .upload-area { width:100%; height:130px; border:2px dashed #00E5FF40; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; background:#00E5FF08; font-size:11px; color:var(--dim); }
    .upload-icon { font-size:28px; margin-bottom:6px; }
    #previewImg  { max-width:100%; max-height:180px; display:none; margin:8px auto; border-radius:8px; border:1px solid var(--border); }
    .geo-result  { background:rgba(0,0,0,.5); border:1px solid var(--border); border-radius:8px; padding:10px; margin-top:8px; display:none; font-size:11px; }

    /* ===== 3D CEREBRO ===== */
    #brainCanvas { width:100%; height:260px; display:block; background:#050a10; border-radius:12px; }
    .zonas-grid  { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-top:8px; }
    .zona-btn    { text-align:center; padding:8px 4px; border-radius:8px; border:1px solid; font-size:9px; cursor:pointer; transition:.2s; }

    /* ===== PERFILES ===== */
    .perfiles-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:8px; }
    .perfil-btn    { background:transparent; border:1px solid #00E5FF30; padding:7px; font-size:10px; color:var(--text); border-radius:6px; cursor:pointer; }
    .perfil-btn.active { border-color:var(--cyan); background:#00E5FF18; color:var(--cyan); }

    /* ===== AVATAR YUCATÁN ===== */
    .avatar-container { width:100%; height:220px; background:var(--bg2); border-radius:12px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; margin-bottom:10px; overflow:hidden; }
    model-viewer { width:100%; height:100%; border-radius:12px; }
    .yucatan-btns { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px; }
    #audioResp  { width:100%; border-radius:8px; margin-top:8px; }

    /* ===== PRE RESULT ===== */
    pre { font-size:10px; color:var(--green); white-space:pre-wrap; word-break:break-all; background:#050a10; padding:8px; border-radius:6px; margin-top:6px; max-height:180px; overflow-y:auto; }

    /* ===== DEVICE DOT ===== */
    .dev-item { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid #1a3a5a; font-size:11px; }
    .dev-dot  { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 5px var(--green); flex-shrink:0; }

    /* ===== MISC ===== */
    .row  { display:flex; gap:6px; }
    .row > * { flex:1; }
    .sep  { border:none; border-top:1px solid var(--border); margin:8px 0; }
    .tag  { display:inline-block; background:#00E5FF12; border:1px solid var(--border); color:var(--cyan); padding:2px 7px; border-radius:12px; font-size:9px; margin:2px; }

    /* ===== ANIMATIONS ===== */
    @keyframes spin  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.15)} }
    @keyframes glow  { 0%,100%{text-shadow:0 0 8px var(--cyan)} 50%{text-shadow:0 0 20px var(--cyan),0 0 40px var(--cyan)} }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🧠</div>

</div>

<!-- ===================== JAVASCRIPT ===================== -->
<script>
// ===== GLOBALS =====
let currentTab = 'mapa';
let hz = 12.3;
let irritabilidad = 30;
let perfil = 'neurotipico';
let chatMessages = [{ role:'sofi', text:"Hola Víctor 🧠 SOFI v6.0 activa. K'uhul 12.3 Hz. ¿En qué trabajamos hoy?" }];
let socket = null;
const LLAVE = "K'uhul_12.3Hz";

// ===== FETCH HZ & STATUS =====
async function fetchEstado() {
  try {
    const r = await fetch('/api/estado');
    const d = await r.json();
    hz = d.frecuencia || 12.3;
    document.getElementById('hzDisplay').textContent = hz.toFixed(2);
    document.getElementById('sbEnergia').textContent = `⚡ E:${d.energia?.toFixed(0)||100}%`;
    document.getElementById('sbShis').textContent    = `🔋 SHIS:${d.shis?.toFixed(0)||95}%`;
    document.getElementById('sbTemp').textContent    = `🌡 ${d.temperatura||36.5}°C`;
  } catch(e) {}
}
setInterval(fetchEstado, 4000);
fetchEstado();

// ===== SOCKET =====
function initSocket() {
  socket = io();
  socket.on('connect', () => socket.emit('validar-llave', LLAVE));
  socket.on('panel-datos', (d) => {
    if (currentTab !== 'integra') return;
    const el = id => document.getElementById(id);
    if (el('iLibros'))      el('iLibros').innerHTML     = d.panelInfo.libros.map(l=>`<span class="tag">📖 ${l}</span>`).join('');
    if (el('iHabilidades')) el('iHabilidades').innerHTML= d.panelInfo.habilidades.map(h=>`<span class="tag">✨ ${h}</span>`).join('');
    if (el('iProyectos'))   el('iProyectos').innerHTML  = d.panelInfo.proyectos.map(p=>`<span class="tag">🚀 ${p}</span>`).join('');
    if (el('iDispositivos'))el('iDispositivos').textContent = d.panelInfo.dispositivos;
    if (el('iRegeneracion'))el('iRegeneracion').textContent = d.panelInfo.regeneracion;
  });
  socket.on('actividad-zona', (d) => {
    const el = document.getElementById('actividadZona');
    if (el) el.innerHTML = `<span style="color:var(--green)">🧠 ${d.zona}</span> · ${d.tiempo}`;
  });
  socket.on('panel-error', e => console.error('Socket:', e));
}

// ===== HELPERS =====
const post = (url, body) => fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }).then(r=>r.json());
const get  = (url)       => fetch(url).then(r=>r.json());

function showResult(elId, data) {
  const el = document.getElementById(elId);
  if (el) el.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
}

//  RENDER FUNCTIONS
// ===========================

      <button class="mapa-btn" id="mZoomIn">+ ZOOM</button>
      <button class="mapa-btn" id="mZoomOut">- ZOOM</button>

  </div>

    <div class="ley-item"><div class="ley-dot" style="background:var(--green)"></div><span>Arqueológico</span></div>

  <div class="coord-box"><div class="coord-lbl">LONGITUD</div><div class="coord-val" id="coordLng">-89.6230°</div><div class="coord-unit">OESTE</div></div>

// --- YUCATÁN AVATAR ---
function renderYucatan() { return `

  <div class="avatar-container">
    <model-viewer id="avatar3d" src="./assets/avatar_yucatan.glb" auto-rotate camera-controls alt="Avatar SOFI Yucatán" style="background:transparent"></model-viewer>

function initMapa() {
  const canvas = document.getElementById('mapaCanvas');
  if (!canvas) return;
  const BOUNDS = { minLat:19.5, maxLat:21.6, minLng:-90.5, maxLng:-87.5 };
  let zoom=1, ox=0, oy=0, showGrid=true;
  let curLat=20.967, curLng=-89.623;
  const puntos = [
    {n:'Mérida',       lat:20.967, lng:-89.623, c:'#00ffc8'}, {n:'Chichén Itzá', lat:20.683, lng:-88.567, c:'#2ECC71'},
    {n:'Uxmal',        lat:20.359, lng:-89.771, c:'#2ECC71'}, {n:'Progreso',     lat:21.283, lng:-89.667, c:'#F39C12'},
    {n:'Dzibilchaltún',lat:21.091, lng:-89.591, c:'#2ECC71'}, {n:'Cenote Ik Kil',lat:20.656, lng:-88.566, c:'#3498DB'},
    {n:'Mayapán',      lat:20.630, lng:-89.460, c:'#2ECC71'}, {n:'Ek Balam',     lat:20.890, lng:-88.136, c:'#2ECC71'},
    {n:'Celestún',     lat:20.859, lng:-90.403, c:'#F39C12'}, {n:'Valladolid',   lat:20.689, lng:-88.202, c:'#9B59B6'},
    {n:'Izamal',       lat:20.932, lng:-89.018, c:'#9B59B6'}, {n:'Cenote Samula',lat:20.645, lng:-88.581, c:'#3498DB'}
  ];
  let ctx;
  function toX(lng) { return ((lng-BOUNDS.minLng)/(BOUNDS.maxLng-BOUNDS.minLng))*canvas.width*zoom + ox; }
  function toY(lat) { return canvas.height - ((lat-BOUNDS.minLat)/(BOUNDS.maxLat-BOUNDS.minLat))*canvas.height*zoom - oy; }
  function draw() {
    ctx.fillStyle='#0a1525'; ctx.fillRect(0,0,canvas.width,canvas.height);
    if (showGrid) {
      ctx.strokeStyle='rgba(0,229,255,.1)'; ctx.lineWidth=.5;
      for (let i=0;i<=10;i++) {
        let y=toY(BOUNDS.minLat+(i/10)*(BOUNDS.maxLat-BOUNDS.minLat));
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
        let x=toX(BOUNDS.minLng+(i/10)*(BOUNDS.maxLng-BOUNDS.minLng));
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
      }
    }
    puntos.forEach(p => {
      let x=toX(p.lng), y=toY(p.lat);
      if(x<-60||x>canvas.width+60||y<-60||y>canvas.height+60) return;
      ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fillStyle=p.c+'50'; ctx.fill();
      ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fillStyle=p.c; ctx.fill();
      ctx.font='8px Share Tech Mono'; ctx.fillStyle=p.c; ctx.fillText(p.n,x+9,y-3);
    });
    let cx=toX(curLng), cy=toY(curLat);
    ctx.beginPath(); ctx.arc(cx,cy,11,0,Math.PI*2); ctx.strokeStyle='#ff3366'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fillStyle='#ff3366'; ctx.fill();
  }
  function updateCoords() {
    const zonas=['PLANO 1','PLANO 2','PLANO 3','PLANO 4','PLANO 5','PLANO 6','PLANO 7','PLANO 8','PLANO 9'];
    document.getElementById('coordLat').textContent = curLat.toFixed(4)+'°';
    document.getElementById('coordLng').textContent = curLng.toFixed(4)+'°';
    document.getElementById('mHz').textContent      = (12.3+(curLat-20.967)*0.05).toFixed(2);
    document.getElementById('mZona').textContent    = zonas[Math.floor(Math.abs(curLat-19.5)/0.23)%9];
  }
  function centrar(lat,lng) {
    curLat=Math.min(BOUNDS.maxLat,Math.max(BOUNDS.minLat,lat));
    curLng=Math.min(BOUNDS.maxLng,Math.max(BOUNDS.minLng,lng));
    zoom=1; ox=0; oy=0; draw(); updateCoords();
  }
  function resize() {
    canvas.width  = canvas.parentElement.clientWidth;
    canvas.height = 280;
    ctx = canvas.getContext('2d');
    centrar(curLat, curLng);
  }
  window.__mapaResize = resize;
  window.__mapaCenter = centrar;
  window.addEventListener('resize', resize);
  resize();
  document.getElementById('mZoomIn')?.addEventListener('click',  ()=>{zoom=Math.min(zoom+0.25,4); draw();});
  document.getElementById('mZoomOut')?.addEventListener('click', ()=>{zoom=Math.max(zoom-0.25,.5); draw();});
  document.getElementById('mReset')?.addEventListener('click',   ()=>centrar(20.967,-89.623));
  document.getElementById('mGrid')?.addEventListener('click',    ()=>{showGrid=!showGrid; draw();});
  // Upload geo
  const ua=document.getElementById('uploadArea'), inp=document.getElementById('imgInput');
  const prev=document.getElementById('previewImg'), btn=document.getElementById('btnAnalizar');
  let archivoGeo=null;
  ua?.addEventListener('click', ()=>inp.click());
  inp?.addEventListener('change', e=>{
    archivoGeo=e.target.files[0]; if(!archivoGeo) return;
    const r=new FileReader(); r.onload=ev=>{prev.src=ev.target.result; prev.style.display='block'; ua.style.display='none'; btn.disabled=false;}; r.readAsDataURL(archivoGeo);
  });
  btn?.addEventListener('click', async ()=>{
    if(!archivoGeo) return; btn.disabled=true; btn.textContent='ANALIZANDO...';
    const fd=new FormData(); fd.append('imagen',archivoGeo);
    try {
      const r=await fetch('/api/geolocalizar',{method:'POST',body:fd}); const d=await r.json();
      if(d.error){alert(d.error);}
      else {
        document.getElementById('geoResult').style.display='block';
        document.getElementById('geoCoords').textContent=`📍 Lat: ${d.lat.toFixed(4)} | Lng: ${d.lng.toFixed(4)}`;
        document.getElementById('geoConf').textContent  =`🎯 Confianza: ${Math.round(d.confianza*100)}% (${d.metodo})`;
        document.getElementById('geoDesc').textContent  = d.descripcion;
        document.getElementById('btnUbicar').onclick    = ()=>centrar(d.lat, d.lng);
      }
    } catch(e){alert('Error de conexión');}
    btn.disabled=false; btn.textContent='ANALIZAR UBICACIÓN';
  });
}

function initCerebro() {
  const canvas = document.getElementById('brainCanvas');
  if (!canvas || !window.THREE) return;
  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  renderer.setSize(canvas.clientWidth||380, 260);
  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, canvas.clientWidth/260, 0.1, 100);
  camera.position.z = 5;
  const geometry = new THREE.SphereGeometry(.35, 20, 20);
  const zonaData = [
    { nombre:'Zona Motora',    pos:[-1.5,0,0], color:0xff5733 },
    { nombre:'Zona Cognitiva', pos:[1.5,0,0],  color:0x3498db },
    { nombre:'Zona Sensorial', pos:[0,1.5,0],  color:0x2ecc71 }
  ];
  const meshes = zonaData.map(z=>{
    const mat  = new THREE.MeshPhongMaterial({ color:z.color, emissive:z.color, emissiveIntensity:.3, transparent:true, opacity:.9 });
    const mesh = new THREE.Mesh(geometry, mat);
    mesh.position.set(...z.pos);
    scene.add(mesh);
    return mesh;
  });
  // Conexiones
  const lineMat = new THREE.LineBasicMaterial({ color:0x00e5ff, opacity:.4, transparent:true });
  [[0,1],[1,2],[2,0]].forEach(([a,b])=>{
    const geo = new THREE.BufferGeometry().setFromPoints([meshes[a].position.clone(), meshes[b].position.clone()]);
    scene.add(new THREE.Line(geo, lineMat));
  });
  // Partículas
  const pgeo = new THREE.BufferGeometry();
  const pts  = new Float32Array(300).map(()=>(Math.random()-.5)*8);
  pgeo.setAttribute('position', new THREE.BufferAttribute(pts,3));
  scene.add(new THREE.Points(pgeo, new THREE.PointsMaterial({color:0x00e5ff,size:.05,transparent:true,opacity:.5})));
  scene.add(new THREE.AmbientLight(0xffffff,.5));
  scene.add(Object.assign(new THREE.PointLight(0x00e5ff,1.5), {position:{x:5,y:5,z:5}}));
  let t=0, running=true;
  function animate(){
    if(!running) return;
    requestAnimationFrame(animate);
    t+=0.012;
    meshes.forEach((m,i)=>{ m.rotation.y+=0.015; m.material.emissiveIntensity=.3+Math.sin(t+i)*0.2; });
    renderer.render(scene, camera);
  }
  animate();
  // Zona buttons
  document.querySelectorAll('.zona-btn').forEach((btn,i)=>{
    btn.addEventListener('click',()=>{
      meshes[i].material.emissiveIntensity=1.5;
      btn.style.background='rgba(255,255,255,.08)';
      setTimeout(()=>{ meshes[i].material.emissiveIntensity=.3; btn.style.background=''; },1500);
    });
  });
  document.getElementById('btnAutoEval')?.addEventListener('click', async()=>{
    const d=await get('/api/autoevaluar'); showResult('autoEvalRes',d);
  });
  document.getElementById('btnSueno')?.addEventListener('click', async()=>{
    const d=await get('/api/sueno/crear');
    document.getElementById('suenoRes').innerHTML=`<div style="background:${d.color}22;border:1px solid ${d.color};border-radius:8px;padding:8px;margin-top:6px;font-size:11px">💭 ${d.tema}<br><span style="color:var(--dim);font-size:9px">${d.timestamp}</span></div>`;
  });
}

    const d=await post('/api/voz',{texto});
    if(d.url){
      document.getElementById('vozRes').innerHTML=`<audio controls src="${d.url}" style="width:100%;margin-top:8px"></audio>`;
    } else {
      document.getElementById('vozRes').innerHTML=`<div style="color:var(--red);font-size:11px;margin-top:6px">${d.error}</div>`;
    }
  });
}

let ultimoProyectoVideo = null;
function initVideo() {
  document.getElementById('btnCrearVid')?.addEventListener('click', async()=>{
    const nombre=document.getElementById('vidNombre').value;
    const tipo=document.getElementById('vidTema').value;
    if(!nombre) return;
    const d=await post('/api/video/crear',{nombre,tipo});
    ultimoProyectoVideo=d;
    document.getElementById('vidRes').innerHTML=`
      <div style="margin-top:8px;font-size:11px">
        <div style="color:var(--green)">✅ ${d.nombre} · ${d.tipo}</div>
        ${d.guion.map(g=>`<div style="margin-top:4px;color:var(--dim)"><span style="color:var(--gold)">${g.tiempo}</span> ${g.texto}</div>`).join('')}
        <div style="margin-top:6px">🎵 ${d.musica.bpm} BPM · ${d.musica.instrumentos.join(', ')}</div>
      </div>`;
    document.getElementById('btnRenderizar').disabled=false;
  });
  document.getElementById('btnRenderizar')?.addEventListener('click', async()=>{
    if(!ultimoProyectoVideo) return;
    const d=await post('/api/video/renderizar',{proyecto:ultimoProyectoVideo});
    showResult('renderRes',d);
  });
}

const suenosHistorial = [];
function initSuenos() {
  document.getElementById('btnGenSueno')?.addEventListener('click', async()=>{
    const d=await get('/api/sueno/crear');
    suenosHistorial.unshift(d);
    document.getElementById('suenoDisplay').innerHTML=`
      <div style="background:${d.color}22;border:2px solid ${d.color};border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:24px">💭</div>
        <div style="font-family:'Orbitron',sans-serif;font-size:12px;color:${d.color};margin:8px 0">${d.tema}</div>
        <div style="font-size:9px;color:var(--dim)">${d.timestamp}</div>
      </div>`;
    document.getElementById('historialSuenos').innerHTML=suenosHistorial.slice(0,5).map(s=>`
      <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
        <div style="width:8px;height:8px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
        <div><div style="font-size:10px">${s.tema}</div><div style="font-size:8px;color:var(--dim)">${s.timestamp}</div></div>
      </div>`).join('');
  });
}

// ===========================
//  TAB CONTROLLER
// ===========================
function setTab(tab) {
  currentTab = tab;
  const c = document.getElementById('content');
  if (tab==='mapa')    { c.innerHTML=renderMapa();    initMapa();    }
  if (tab==='cerebro') { c.innerHTML=renderCerebro(); initCerebro(); }
  if (tab==='chat')    { c.innerHTML=renderChat();    initChat();    }
  if (tab==='yucatan') { c.innerHTML=renderYucatan(); }
  if (tab==='integra') { c.innerHTML=renderIntegra(); initIntegra(); }
  if (tab==='cuerpo')  { c.innerHTML=renderCuerpo();  initCuerpo();  }
  if (tab==='energia') { c.innerHTML=renderEnergia(); initEnergia(); }
  if (tab==='video')   { c.innerHTML=renderVideo();   initVideo();   }
  if (tab==='suenos')  { c.innerHTML=renderSuenos();  initSuenos();  }
}

// ===========================
//  BOOT
// ===========================
window.addEventListener('load', ()=>{
  initSocket();
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      setTab(tab.dataset.tab);
    });
  });
  setTab('mapa');
});
</script>
</body>
</html>
